name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: GCC 16 Coverage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC 16 and tools
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-16 g++-16 ninja-build ccache gcovr

      - name: Set up GCC 16 at expected path
        run: |
          sudo mkdir -p /home/ch0pe/.local/gcc-16/bin
          sudo ln -sf "$(which gcc-16)" /home/ch0pe/.local/gcc-16/bin/gcc
          sudo ln -sf "$(which g++-16)" /home/ch0pe/.local/gcc-16/bin/g++

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Conan
        run: pip install "conan>=2.0.15"

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-gcc16-${{ hashFiles('conan/conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-gcc16-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-coverage-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-coverage-${{ runner.os }}-

      - name: Configure Conan
        run: conan config install conan/config

      - name: Authenticate Conan remote
        run: conan remote login monostudio-conan-local "${{ secrets.CONAN_USERNAME }}" --password "${{ secrets.CONAN_PASSWORD }}"

      - name: Install Conan dependencies
        env:
          PYTHON_EXE: python3
        run: ./conan/install.sh Coverage-gcc

      - name: Configure
        run: cmake --preset Coverage-gcc

      - name: Build
        run: cmake --build --preset Coverage-gcc

      - name: Test
        run: ctest --preset Coverage-gcc

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          gcovr \
            --root . \
            --filter 'src/include/' \
            --gcov-executable gcov-16 \
            --xml coverage.xml \
            --html-details coverage/index.html \
            --print-summary \
            build/gcc/coverage

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: true
